    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is MyLifeFolio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyLifeFolio is a secure digital life plan that organizes everything that matters about your life, finances, healthcare, documents, and legacy in one place — and gives the people you trust controlled access to exactly the right information at exactly the right moment."
          }
        },
        {
          "@type": "Question",
          "name": "Who is MyLifeFolio for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyLifeFolio is for anyone who wants their family to know what to do in an emergency, during a medical event, or after a loss. It is especially valuable for parents, caregivers, retirees, and anyone with an estate plan who wants the practical information their family will actually need (account numbers, providers, wishes, passwords, documents) organized alongside the legal documents themselves."
          }
        },
        {
          "@type": "Question",
          "name": "How is MyLifeFolio different from a will or estate plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An estate plan is the legal framework. MyLifeFolio is the operational guide — the inventory of accounts, the medical directives, the family contacts, the digital assets, and the personal wishes that families actually need to find and use during a crisis. The two work together: the estate plan is what the law requires, and MyLifeFolio is what your family wishes you had also left behind."
          }
        },
        {
          "@type": "Question",
          "name": "How much does MyLifeFolio cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyLifeFolio is $149 per year. Start with a 6-month free trial — no credit card required up front. Add a payment method only if you decide to keep going at the 6-month mark."
          }
        },
        {
          "@type": "Question",
          "name": "Why no credit card up front?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We don't want anything in the way of you trying it. Add a card only if you decide to keep going at the 6-month mark."
          }
        },
        {
          "@type": "Question",
          "name": "What happens to my data if I don't renew?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "It is permanently deleted. We do not store inactive accounts. You will get four reminder emails — 30 days before the trial ends, 7 days before, the day of, and 7 days after — so you have plenty of warning to renew or to download anything you want to keep."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel partway through the year?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Your subscription stays active through the end of the period you paid for, then deletes per the same policy as a trial cancellation."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All data is encrypted at rest. The credential vault uses client-side AES-256 encryption — even MyLifeFolio cannot read it. Row-level security ensures only you and the people you grant access to can see your folio."
          }
        },
        {
          "@type": "Question",
          "name": "What is included in the AI obituary?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI-generated, thoughtful obituary draft based on the life information you have entered. You can generate multiple versions and edit them to your liking. Included for everyone — trial and paid alike."
          }
        },
        {
          "@type": "Question",
          "name": "Can family members access my MyLifeFolio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You decide who gets access, what they can see, and when. Family members log in through a separate Family Access portal and only see the information you have specifically granted to them."
          }
        }
      ]
    }
    </script>
